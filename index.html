<!DOCTYPE html>

<html lang="en">
    <head>
        <title>Zen</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <audio src="assets/black-noise.m4a" id="black-noise" autoplay loop></audio>

        <div id="welcome-container">
            <h1 id="w-h1">Zen</h1>
            <p id="w-desc">A simple landscape with black noise.</p>
            <p id="w-tip">You may need to click anywhere on the page before audio can play.</p>
            <button id="w-enter">Enter Zen</button>
        </div>

        <div id="main-container">
            <img src="assets/sand.svg" alt="sand" id="sand" draggable="false" height="100">
            <img src="assets/group-tree.svg" alt="tree group" id="group-tree" height="200">
        </div>

        <script src="script.js"></script>
    </body>
</html>
