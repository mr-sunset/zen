<!DOCTYPE html>

<html lang="en">
    <head>
        <title>Zen</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css?v=1.03">
        <link rel="icon" type="image/png" href="assets/favicon.png">
        <!--------->
        <!-- SEO -->
        <!--------->
        <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
        <meta name="description" content="A simple zen island with black noise.">
        <meta name="author" content="JC">
        
        <meta property="og:type" content="website">
        <meta property="og:url" content="https://zen-jc.netlify.app/">
        <meta property="og:title" content="Zen Island">
        <meta property="og:description" content="A simple zen island with black noise.">
        <meta property="og:image" content="https://zen-jc.netlify.app/assets/apple-touch-icon.png/">        

        <meta name="twitter:card" content="summary">
        <meta name="twitter:url" content="https://zen-jc.netlify.app">
        <meta name="twitter:title" content="Zen Island">
        <meta name="twitter:description" content="A simple zen island with black noise.">
        <meta name="twitter:image" content="https://zen-jc.netlify.app/assets/apple-touch-icon.png/">
    </head>

    <body>
        <audio src="assets/black-noise.ogg" id="black-noise" autoplay loop></audio>

        <div id="welcome-container">
            <h1 id="w-h1">Zen</h1>
            <p id="w-desc">A simple landscape with black noise.</p>
            <p id="w-tip"><em>Enabling controls allows for volume control and pausing. It's highly recommended to turn it on.</em></p>
            
            <input type="checkbox" id="w-controls-toggle"> 
            <label for="w-controls-toggle">Controls</label> <br> <br>

            <button id="w-enter">Enter Zen</button>
        </div>

        <div id="main-container">
            <img src="assets/sand.svg" alt="sand" id="sand" draggable="false" height="100">
            <img src="assets/group-tree.svg" alt="tree group" id="group-tree" height="200">
        </div>

        <script src="script.js?ver=1.02"></script>
    </body>
</html>
